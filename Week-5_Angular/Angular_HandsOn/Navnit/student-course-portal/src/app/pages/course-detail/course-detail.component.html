<section class="container" *ngIf="course; else missing">
  <h2>{{ course.name }}</h2>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits }}</p>
  <p>Grade Status: {{ course.gradeStatus }}</p>

  <h3>Enrolled Students</h3>
  <ul>
    <li *ngFor="let s of students">{{ s.name }}</li>
  </ul>
</section>

<ng-template #missing>
  <section class="container">
    <p>{{ errorMessage || 'Loading course...' }}</p>
  </section>
</ng-template>
