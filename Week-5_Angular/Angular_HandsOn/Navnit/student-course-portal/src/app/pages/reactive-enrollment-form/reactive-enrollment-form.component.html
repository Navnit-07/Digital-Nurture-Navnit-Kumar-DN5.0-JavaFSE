<section class="container">
  <h2>Enrollment Request (Reactive Form)</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()" class="form">
    <label>
      Student Name
      <input formControlName="studentName" />
    </label>

    <label>
      Student Email
      <input formControlName="studentEmail" />
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">Email taken</span>
    </label>

    <label>
      Course ID / Code
      <input formControlName="courseId" />
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
        >Course code starting with XX is not allowed.</span
      >
    </label>

    <label>
      Preferred Semester
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </label>

    <label class="checkbox">
      <input type="checkbox" formControlName="agreeToTerms" />
      I agree to the terms
    </label>

    <div formArrayName="additionalCourses">
      <h3>Additional Courses</h3>
      <button type="button" (click)="addCourse()">Add Another Course</button>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="extra-row">
        <input [formControl]="$any(ctrl)" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
    </div>

    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  </form>
</section>
